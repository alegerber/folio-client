name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      # Validate the published artifact actually resolves: publint checks the
      # exports/main/module wiring, attw checks the per-condition type maps.
      # These catch exports/.mjs-style breakage that lint/typecheck/test miss.
      - run: npx --yes publint
      - run: npx --yes @arethetypeswrong/cli --pack
